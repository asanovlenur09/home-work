<!DOCTYPE html>
<html class="page" lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/index.css">
  <link rel="shortcut icon" href="./icons/nike-favicon-32x32(1).ico">
  <script src="./js/index.js" type="module"></script>
  <title>Nike</title>
</head>

<body class="page__body">
  <header class="header">
    <div class="container header__container">
      <a class="logo header__logo" href="#">
        <img class="logo__img" src="./icons/logo-icon.svg" width="50" height="20" alt="логотип-nike">
      </a>
      <nav class="menu header__menu" id="header__menu">
        <ul class="menu__list">
          <li class="menu__item">
            <a class="menu__link" href="#air-mag" lang="en">Air Mag</a>
          </li>
          <li class="menu__item">
            <a class="menu__link" href="#size">Размеры</a>
          </li>
          <li class="menu__item">
            <a class="menu__link" href="#characteristics">Характеристики</a>
          </li>
          <li class="menu__item">
            <a class="menu__link" href="#topmodels">Другие ТОП модели</a>
        </ul>
      </nav>
      <div class="header__controls">
        <a class="header__order" href="#">Cделать заказ</a>
        <div class="header__actions">
          <button class="header__actions-button">
            <svg width="24" height="24">
              <use class="header__actions-icon" href="./icons/sprite.svg#search"></use>
            </svg>
          </button>
          <button class="header__actions-button">
            <svg width="24" height="24">
              <use class="header__actions-icon" href="./icons/sprite.svg#cart"></use>
            </svg>
          </button>
          <div class="header__burger burger" aria-label="Открыть меню" aria-expanded="false"
            aria-controls="header__menu">
            <input class="burger__check" type="checkbox">
            <div class="burger__line"></div>
            <div class="burger__line"></div>
            <div class="burger__line"></div>
          </div>
        </div>

      </div>

    </div>
  </header>
  <main class="main">
    <section class="hero">
      <div class="container hero__container">
        <header class="hero__header">
          <ul class="hero__benefits-list">
            <li class="hero__benefits-item">стиль</li>
            <li class="hero__benefits-item">скорость</li>
          </ul>
          <h1 class="hero__title">Nike <span class="hero__title-accent">air</span> mag</h1>
        </header>
        <img class="hero__img" src="./imeges/nike-air-mag-1.png" width="846" height="713"
          alt="кроссовок Nike Air Mag с желтым кольцом под подошвой">
        <footer class="hero__footer">
          <a class="hero__details" href="#">
            Подробнее
            <svg width="24" height="24">
              <use 
              class="hero__details-icon" href="./icons/main-sprite.svg#arrow-right"></use>
            </svg>
          </a>
        </footer>
      </div>
    </section>
  </main>
</body>

</html>
